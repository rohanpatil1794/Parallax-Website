<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive 3D Parallax Website</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <nav>
      <img src="img/logo.png" class="logo" alt="logo">
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Blog</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
      <div class="search">
        <a href="#"><i class="fas fa-search"></i></a>
      </div>
      <div class="hamburger">
        <a href="#">
          <div class="bar"></div>
        </a>
      </div>
    </nav>
  </header>

  <main>
    <img src="img/background.png" class="parallax bg-img"
         data-speedx="0.2" data-speedy="0.1" data-speedz="0" data-rotation="0">

    <img src="img/fog_7.png" class="parallax fog-7"
         data-speedx="0.25" data-speedy="0.15" data-speedz="0.05" data-rotation="0.02">

    <img src="img/mountain_10.png" class="parallax mountain-10"
         data-speedx="0.3" data-speedy="0.2" data-speedz="0.1" data-rotation="0.03">

    <img src="img/fog_6.png" class="parallax fog-6"
         data-speedx="0.35" data-speedy="0.22" data-speedz="0.12" data-rotation="0.03">

    <img src="img/mountain_9.png" class="parallax mountain-9"
         data-speedx="0.4" data-speedy="0.25" data-speedz="0.14" data-rotation="0.04">

    <img src="img/mountain_8.png" class="parallax mountain-8"
         data-speedx="0.45" data-speedy="0.28" data-speedz="0.16" data-rotation="0.05">

    <img src="img/fog_5.png" class="parallax fog-5"
         data-speedx="0.48" data-speedy="0.3" data-speedz="0.17" data-rotation="0.05">

    <img src="img/mountain_7.png" class="parallax mountain-7"
         data-speedx="0.5" data-speedy="0.32" data-speedz="0.18" data-rotation="0.06">

    <div class="text">
      <h2>Welcome to</h2>
      <h1>Maharashtra</h1>
    </div>

    <img src="img/mountain_6.png" class="parallax mountain-6"
         data-speedx="0.55" data-speedy="0.35" data-speedz="0.2" data-rotation="0.06">

    <img src="img/fog_4.png" class="parallax fog-4"
         data-speedx="0.58" data-speedy="0.37" data-speedz="0.22" data-rotation="0.07">

    <img src="img/mountain_5.png" class="parallax mountain-5"
         data-speedx="0.6" data-speedy="0.3" data-speedz="0.24" data-rotation="0.07">

    <img src="img/fog_3.png" class="parallax fog-3"
         data-speedx="0.63" data-speedy="0.42" data-speedz="0.26" data-rotation="0.08">

    <img src="img/mountain_4.png" class="parallax mountain-4"
         data-speedx="0.65" data-speedy="0.28" data-speedz="0.28" data-rotation="0.08">

    <img src="img/mountain_3.png" class="parallax mountain-3"
         data-speedx="0.4" data-speedy="0.48" data-speedz="0.3" data-rotation="0.09">

    <img src="img/fog_2.png" class="parallax fog-2"
         data-speedx="0.73" data-speedy="0.5" data-speedz="0.32" data-rotation="0.09">

    <img src="img/mountain_2.png" class="parallax mountain-2"
         data-speedx="0.75" data-speedy="0.52" data-speedz="0.34" data-rotation="0.1">

    <img src="img/mountain_1.png" class="parallax mountain-1"
         data-speedx="0.1" data-speedy="0.55" data-speedz="0.36" data-rotation="0.1">

    <img src="img/sun_rays.png" class="parallax sun-rays"
         data-speedx="0.4" data-speedy="0.25" data-speedz="0" data-rotation="0.06">

    <img src="img/black_shadow.png" class="black-shadow">

    <img src="img/fog_1.png" class="parallax fog-1"
         data-speedx="0.3" data-speedy="0.6" data-speedz="0.4" data-rotation="0.1">

    <div class="vignette"></div>
  </main>

  <script src="js/gsap.min.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
